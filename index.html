<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Kanji Step - 日本語学習</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
    }

    /* ダークモード (デフォルト) */
    body.dark {
      --bg: #121212;
      --surface: #1e1e2a;
      --card: #2a2a36;
      --text: #f0f0f0;
      --text-secondary: #b0b0c0;
      --border: #3a3a48;
      --accent: #7c4dff;
      --accent-hover: #966eff;
      --button-bg: #2d2d3a;
      --footer-bg: #1a1a24;
    }

    /* クリアモード (ライト) */
    body.light {
      --bg: #f8f9fc;
      --surface: #ffffff;
      --card: #ffffff;
      --text: #1e1e2a;
      --text-secondary: #4a4a5a;
      --border: #dddde6;
      --accent: #5e3bdd;
      --accent-hover: #7c4dff;
      --button-bg: #efeff4;
      --footer-bg: #eef0f5;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans', sans-serif;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    .app-header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #b47cff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    button, .lang-btn {
      background: var(--button-bg);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover, .lang-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .active-lang {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .part-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.8rem;
      justify-content: center;
      margin-top: 2rem;
    }
    .part-card {
      background: var(--card);
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      width: 200px;
      text-align: center;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }
    .part-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      border-color: var(--accent);
    }
    .part-icon {
      font-size: 3.5rem;
      margin-bottom: 0.8rem;
    }
    .part-title {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .part-desc {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .back-bar {
      margin-bottom: 1.5rem;
    }
    .back-btn {
      background: var(--button-bg);
      border: none;
      padding: 0.5rem 1.2rem;
      font-size: 1rem;
      border-radius: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .words-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .word-card {
      background: var(--card);
      border-radius: 1.5rem;
      padding: 1.2rem;
      border: 1px solid var(--border);
      transition: 0.1s;
    }
    .word-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }
    .kanji-area {
      font-size: 2.8rem;
      font-weight: 700;
      line-height: 1.2;
    }
    .reading {
      font-size: 1rem;
      color: var(--accent);
      background: rgba(124,77,255,0.15);
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
    }
    .meaning {
      margin: 0.8rem 0;
      font-weight: 500;
      color: var(--text-secondary);
    }
    .example {
      background: var(--surface);
      padding: 0.7rem;
      border-radius: 1rem;
      margin: 0.8rem 0;
      font-style: italic;
      border-left: 3px solid var(--accent);
    }
    .example-sub {
      margin-top: 0.4rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      border-top: 1px dashed var(--border);
      padding-top: 0.4rem;
    }
    .audio-buttons {
      display: flex;
      gap: 0.8rem;
      margin: 0.8rem 0 0.5rem;
    }
    .audio-btn {
      background: var(--button-bg);
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .illustration-placeholder {
      margin-top: 0.8rem;
      background: var(--surface);
      border-radius: 1rem;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      border: 1px dashed var(--border);
      font-size: 0.8rem;
      text-align: center;
      padding: 0.5rem;
    }
    .illustration-placeholder img {
      max-width: 100%;
      max-height: 70px;
      object-fit: contain;
    }
    .footer {
      margin-top: 4rem;
      text-align: center;
      padding: 2rem 1rem;
      background: var(--footer-bg);
      border-radius: 2rem 2rem 0 0;
      font-size: 0.85rem;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 640px) {
      .words-grid { grid-template-columns: 1fr; }
      .part-card { width: 160px; padding: 1.2rem; }
    }
  </style>
</head>
<body class="dark">

        { kanji: "一番", kana: "いちばん", meanings: { en: "the most", it: "il più", ru: "самый", ja: "一番" }, examples: { en: "My favorite color is red.", it: "Il mio colore preferito è il rosso.", ru: "Мой любимый цвет - красный.", ja: "一番好きな色は赤です。" } },
        { kanji: "必ず", kana: "かならず", meanings: { en: "certainly / without fail", it: "sicuramente / senza fallo", ru: "обязательно", ja: "必ず" }, examples: { en: "Please be sure to come.", it: "Per favore, vieni sicuramente.", ru: "Пожалуйста, обязательно приходите.", ja: "必ず来てください。" } },
        { kanji: "大変", kana: "たいへん", meanings: { en: "very / tough", it: "molto / difficile", ru: "очень / тяжело", ja: "大変" }, examples: { en: "I am very tired.", it: "Sono molto stanco.", ru: "Я очень устал.", ja: "大変疲れました。" } },
        { kanji: "時々", kana: "ときどき", meanings: { en: "sometimes", it: "qualche volta", ru: "иногда", ja: "時々" }, examples: { en: "I sometimes watch movies.", it: "Qualche volta guardo film.", ru: "Я иногда смотрю фильмы.", ja: "時々映画を見ます。" } }
      ]
    };

    // UI 多言語テキスト (動的部分)
    const UI_TEXTS = {
      en: { back: "Back", contact: "Contact us", illustration: "🖼️ Illustration coming soon", dark: "Dark mode", light: "Clear mode" },
      it: { back: "Indietro", contact: "Contattaci", illustration: "🖼️ Illustrazione in arrivo", dark: "Modalità scura", light: "Modalità chiara" },
      ru: { back: "Назад", contact: "Связаться с нами", illustration: "🖼️ Иллюстрация скоро", dark: "Тёмный режим", light: "Светлый режим" },
      ja: { back: "戻る", contact: "お問い合わせ", illustration: "🖼️ イラスト追加予定", dark: "ダークモード", light: "クリアモード" }
    };

    let currentLang = "en";
    let currentView = "main";
    let currentPart = null;

    const mainViewDiv = document.getElementById("mainView");
    const detailViewDiv = document.getElementById("detailView");
    const partsGrid = document.getElementById("partsGrid");
    const detailTitle = document.getElementById("detailTitle");
    const wordsContainer = document.getElementById("wordsContainer");
    const backBtn = document.getElementById("backToMain");
    const backTextSpan = document.getElementById("backText");
    const contactTextSpan = document.getElementById("contactText");
    const themeToggle = document.getElementById("themeToggle");
    const appTitle = document.getElementById("appTitle");

    const titles = { en: "📖 Kanji Step", it: "📖 Passo Kanji", ru: "📖 Кандзи шаг", ja: "📖 漢字ステップ" };

    function getMeaning(item) {
      return item.meanings[currentLang] || item.meanings.en;
    }

    function getExampleDisplay(item) {
      const jpExample = item.examples.ja;
      if (currentLang === 'ja') {
        return { main: jpExample, sub: null };
      } else {
        const targetExample = item.examples[currentLang] || item.examples.en;
        return { main: jpExample, sub: targetExample };
      }
    }

    // 音声連続再生
    let currentUtterance = null;
    function speakSequence(texts, langCodes) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      if (!texts.length) return;
      let index = 0;
      function speakNext() {
        if (index >= texts.length) return;
        const utterance = new SpeechSynthesisUtterance(texts[index]);
        utterance.lang = langCodes[index];
        utterance.rate = 0.9;
        utterance.onend = () => { index++; speakNext(); };
        utterance.onerror = () => { index++; speakNext(); };
        currentUtterance = utterance;
        window.speechSynthesis.speak(utterance);
      }
      speakNext();
    }

    function playExampleAudio(item) {
      const jpExample = item.examples.ja;
      if (currentLang === 'ja') {
        speakSequence([jpExample], ['ja-JP']);
      } else {
        let targetLangCode = 'en-US';
        if (currentLang === 'it') targetLangCode = 'it-IT';
        else if (currentLang === 'ru') targetLangCode = 'ru-RU';
        else targetLangCode = 'en-US';
        const targetExample = item.examples[currentLang] || item.examples.en;
        speakSequence([jpExample, targetExample], ['ja-JP', targetLangCode]);
      }
    }

    function updateUILabels() {
      backTextSpan.innerText = UI_TEXTS[currentLang].back;
      contactTextSpan.innerText = UI_TEXTS[currentLang].contact;
      const isDark = document.body.classList.contains('dark');
      themeToggle.innerText = isDark ? UI_TEXTS[currentLang].light : UI_TEXTS[currentLang].dark;
    }

    function renderMain() {
      const parts = [
        { id: "nouns", name: { en: "Nouns", it: "Sostantivi", ru: "Существительные", ja: "名詞" }, icon: "📚", desc: { en: "People, places, things", it: "Persone, luoghi, cose", ru: "Люди, места, вещи", ja: "人・場所・もの" } },
        { id: "verbs", name: { en: "Verbs", it: "Verbi", ru: "Глаголы", ja: "動詞" }, icon: "⚡", desc: { en: "Actions & states", it: "Azioni e stati", ru: "Действия и состояния", ja: "動作・状態" } },
        { id: "adjectives", name: { en: "Adjectives", it: "Aggettivi", ru: "Прилагательные", ja: "形容詞" }, icon: "🎨", desc: { en: "Describe things", it: "Descrivono cose", ru: "Описывают вещи", ja: "性質・状態" } },
        { id: "adverbs", name: { en: "Adverbs", it: "Avverbi", ru: "Наречия", ja: "副詞" }, icon: "✨", desc: { en: "Modify verbs/adjectives", it: "Modificano verbi/aggettivi", ru: "Изменяют глаголы/прилагательные", ja: "動詞・形容詞を修飾" } }
      ];
      partsGrid.innerHTML = parts.map(part => `
        <div class="part-card" data-part="${part.id}">
          <div class="part-icon">${part.icon}</div>
          <div class="part-title">${part.name[currentLang]}</div>
          <div class="part-desc">${part.desc[currentLang]}</div>
        </div>
      `).join('');
      document.querySelectorAll('.part-card').forEach(card => {
        card.addEventListener('click', () => showDetailView(card.dataset.part));
      });
    }

    function showDetailView(partId) {
      currentPart = partId;
      let dataArray, titleKey;
      if (partId === "nouns") { dataArray = VOCAB_DATA.nouns; titleKey = "Sostantivi"; }
      else if (partId === "verbs") { dataArray = VOCAB_DATA.verbs; titleKey = "Verbi"; }
      else if (partId === "adjectives") { dataArray = VOCAB_DATA.adjectives; titleKey = "Aggettivi"; }
      else { dataArray = VOCAB_DATA.adverbs; titleKey = "Avverbi"; }
      
      const titleMap = { en: titleKey, it: titleKey, ru: titleKey, ja: titleKey === "Sostantivi" ? "名詞" : titleKey === "Verbi" ? "動詞" : titleKey === "Aggettivi" ? "形容詞" : "副詞" };
      detailTitle.innerText = titleMap[currentLang];
      
      wordsContainer.innerHTML = dataArray.map((item, idx) => {
        const meaning = getMeaning(item);
        const { main: exampleMain, sub: exampleSub } = getExampleDisplay(item);
        const imageId = `img_${partId}_${idx}`;
        const subHtml = exampleSub ? `<div class="example-sub">🌐 ${exampleSub}</div>` : '';
        return `
          <div class="word-card" data-word-idx="${idx}">
            <div class="word-header">
              <div class="kanji-area">${item.kanji}</div>
              <div class="reading">${item.kana}</div>
            </div>
            <div class="meaning">📖 ${meaning}</div>
            <div class="example">💬 ${exampleMain}${subHtml}</div>
            <div class="audio-buttons">
              <button class="audio-btn kanji-audio" data-kana="${item.kana}">🔊 漢字</button>
              <button class="audio-btn example-audio" data-item-idx="${idx}" data-part="${partId}">🎧 例文</button>
            </div>
            <div class="illustration-placeholder" id="${imageId}">
              ${UI_TEXTS[currentLang].illustration}
            </div>
          </div>
        `;
      }).join('');
      
      document.querySelectorAll('.kanji-audio').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const kana = btn.dataset.kana;
          if (kana) speakSequence([kana], ['ja-JP']);
        });
      });
      document.querySelectorAll('.example-audio').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const part = btn.dataset.part;
          const idx = parseInt(btn.dataset.itemIdx);
          let item = null;
          if (part === "nouns") item = VOCAB_DATA.nouns[idx];
          else if (part === "verbs") item = VOCAB_DATA.verbs[idx];
          else if (part === "adjectives") item = VOCAB_DATA.adjectives[idx];
          else if (part === "adverbs") item = VOCAB_DATA.adverbs[idx];
          if (item) playExampleAudio(item);
        });
      });
      
      mainViewDiv.classList.add("hidden");
      detailViewDiv.classList.remove("hidden");
      currentView = "detail";
    }

    function backToMain() {
      mainViewDiv.classList.remove("hidden");
      detailViewDiv.classList.add("hidden");
      currentView = "main";
      currentPart = null;
    }

    function setLanguage(lang) {
      currentLang = lang;
      appTitle.innerText = titles[lang];
      document.querySelectorAll('.lang-btn').forEach(btn => {
        if (btn.dataset.lang === lang) btn.classList.add('active-lang');
        else btn.classList.remove('active-lang');
      });
      updateUILabels();
      if (currentView === "main") {
        renderMain();
      } else if (currentView === "detail" && currentPart) {
        showDetailView(currentPart);
      }
    }

    function initTheme() {
      const isDark = localStorage.getItem('theme') !== 'light';
      document.body.classList.toggle('dark', isDark);
      document.body.classList.toggle('light', !isDark);
      updateUILabels();
    }
    function toggleTheme() {
      const isDark = document.body.classList.contains('dark');
      if (isDark) {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('light');
        document.body.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      updateUILabels();
    }

    document.getElementById("langGroup").addEventListener('click', (e) => {
      const langBtn = e.target.closest('.lang-btn');
      if (langBtn && langBtn.dataset.lang) setLanguage(langBtn.dataset.lang);
    });
    backBtn.addEventListener('click', backToMain);
    themeToggle.addEventListener('click', toggleTheme);
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => console.log('SW registered:', reg)).catch(err => console.log('SW failed:', err));
    }
    
    initTheme();
    setLanguage('en');
    renderMain();
  </script>
</body>
</html>
